    <link rel="stylesheet" href="style.css">

<body>

        </div>
        <div class="heroCopy">

        </div>
    </section>


    <section class="about">
        <div class="aboutImages">
            <div class="aboutImgs-col" id="aboutImgs-col-1">
                <div class="img">
                    <img src="/1.jpeg" alt="">

                <div class="img">
                    <img src="/2.jpeg" alt="">

                <div class="img">
                    <img src="/3.jpeg" alt="">
                </div>
                <div class="img">
                    <img src="/4.jpeg" alt="">
                </div>
            </div>
            <div class="aboutImgs-col" id="aboutImgs-col-2">
                <div class="img">
                    <img src="/5.jpeg" alt="">
                </div>
                <div class="img">
                    <img src="/6.jpeg" alt="">
                </div>
                <div class="img">
                    <img src="/3.jpeg" alt="">
                </div>
                <div class="img">
                    <img src="/4.jpeg" alt="">
                </div>
            </div>
            <div class="aboutImgs-col" id="aboutImgs-col-3">
                <div class="img">
                    <img src="/5.jpeg" alt="">

                <div class="img">
                    <img src="/6.jpeg" alt="">
                </div>
                <div class="img">
                    <img src="/1.jpeg" alt="">
                </div>
                <div class="img">
                    <img src="/5.jpeg" alt="">
                </div>
            </div>
            <div class="aboutImgs-col" id="aboutImgs-col-4">
                <div class="img">
                    <img src="/6.jpeg" alt="">
                </div>
                <div class="img">
                    <img src="/1.jpeg" alt="">
                </div>
                <div class="img">
                    <img src="/3.jpeg" alt="">
                </div>
                <div class="img">
                    <img src="/2.jpeg" alt="">
                </div>
            </div>
        </div>

        <div class="aboutHeader">
            <h3>
                Fragment of motion and atmosphere gathered into a drifting 
                collection
                of quiet visual moments
            </h3>
        </div>
    </section>

    <section class="outro">
        <h3>The frame settles back into quiet stillness</h3>
    </section>
    
    <script type="module" src="script.js"></script>

</html>
